name: CI/CD Pipeline for Aegisops

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: aegisops
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}
  K8S_PATH: kubernetes

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push images to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-image # Assign an ID to this step to reference its outputs
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      # Expose the SHA-based image tag for downstream jobs (e.g., deployment).
      # This ensures immutable and reproducible deployments, despite also pushing a 'latest' tag.
      image_tag: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-to-kubernetes:
    runs-on: ubuntu-latest
    needs: build-and-push-image # This job depends on the successful completion of the build-and-push-image job
    environment: production # Use GitHub Environments for better security and management of environment-specific secrets
    permissions:
      contents: read # Required to checkout the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kustomize
        # Installs Kustomize, which is used to update the image tag in Kubernetes manifests.
        uses: kodermax/setup-kustomize@v1
        with:
          kustomize-version: v5.0.3

      - name: Configure Kubeconfig
        # Sets up kubectl access by writing the Kubernetes cluster configuration from a secret.
        # This method is common for generic Kubernetes clusters.
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Kubernetes deployment image with Kustomize
        # This step dynamically creates a kustomization.yaml file to override the image tag.
        # It assumes your base deployment.yaml (located in ${{ env.K8S_PATH }})
        # contains an image whose name matches `env.IMAGE_NAME` (e.g., `aegisops`)
        # which needs to be updated.
        run: |
          cat <<EOF > ${{ env.K8S_PATH }}/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml # Assuming service.yaml is also a base resource to be managed by Kustomize
images:
  - name: ${{ env.IMAGE_NAME }} # This must match the image name in your base deployment.yaml
    newName: ${{ needs.build-and-push-image.outputs.image_tag }}
    newTag: "" # newTag is empty because newName already includes the full tag
EOF

      - name: Apply Kubernetes manifests
        # Builds the Kustomize manifests and applies them to the Kubernetes cluster.
        # The 'latest' deployment strategy here refers to deploying the image tagged with
        # the specific GitHub SHA of the latest successful build, ensuring reproducibility.
        run: |
          kubectl kustomize ${{ env.K8S_PATH }} | kubectl apply -f -

      - name: Verify Kubernetes deployment rollout status
        # Adds post-deployment verification to ensure the new deployment rolls out successfully.
        # Replace 'aegisops-deployment' with the actual name of your Kubernetes Deployment
        # as defined in your deployment.yaml.
        run: |
          kubectl rollout status deployment/aegisops-deployment

      # Suggestion: Implement Rollback Strategy
      # For production deployments, consider adding steps or clear documentation for how to perform
      # a rollback to a previous application version in case of a failed or buggy deployment.
      # Example: kubectl rollout undo deployment/aegisops-deployment --to-revision=<previous-revision>
      # This is often a manual step or part of a separate incident response workflow rather than
      # being fully automated within a standard CI/CD deployment flow.