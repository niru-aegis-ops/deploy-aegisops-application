apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisops-deployment
  labels:
    app: aegisops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegisops
  template:
    metadata:
      labels:
        app: aegisops
    spec:
      containers:
      - name: aegisops-app
        image: IMAGE_PLACEHOLDER # This will be replaced by GitHub Actions
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
