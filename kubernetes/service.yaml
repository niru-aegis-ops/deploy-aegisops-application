apiVersion: v1
kind: Service
metadata:
  name: aegisops-service
  labels:
    app: aegisops
spec:
  selector:
    app: aegisops
  ports:
  - protocol: TCP
    port: 80       # Port exposed by the service (internal to cluster)
    targetPort: 5000 # Port on the container
  type: ClusterIP # Use LoadBalancer for external access in cloud environments, or NodePort for testing
